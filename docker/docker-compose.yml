services:
  worker:
    build: { context: .., dockerfile: docker/Dockerfile }
    env_file: ../.env
    restart: unless-stopped
    expose: ["8080"]
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["443:443", "80:80"]
    volumes: [ "./Caddyfile:/etc/caddy/Caddyfile:ro", "caddy_data:/data" ]
    environment: [ "EDGE_SHARED_SECRET=${EDGE_SHARED_SECRET}" ]
volumes: { caddy_data: {} }
