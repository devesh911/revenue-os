name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks lists PR commits
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11" # G2

      - run: bun install --frozen-lockfile

      - run: bun run lint # includes G1 restricted-imports

      - run: bun run typecheck

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1 # G2: pin the whole toolchain, CLI included

      - name: Start local Supabase stack # real local stack for integration tests
        run: |
          test -f supabase/config.toml || supabase init
          supabase start

      - name: Export local stack env for tests
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY)=')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "DATABASE_URL=postgresql://app_service:app_service_local@127.0.0.1:54322/postgres"
            echo "LOCAL_DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres"
            echo "VAPI_WEBHOOK_SECRET=local-test-secret"
          } >> "$GITHUB_ENV"

      - run: bun test

      - run: bun run rls:check
        env:
          LOCAL_DB_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"

      - uses: gitleaks/gitleaks-action@v2 # S9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
