name: ci
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true # superseded pushes stop burning the ~2m15s stack spin-up

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks lists PR commits
    steps:
      # G2/S12: actions SHA-pinned — mutable tags are supply-chain surface
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2 — S9.3, first for fail-fast
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11" # G2

      - run: bun install --frozen-lockfile

      - run: bun audit # T14/S12.1 dependency audit (task 11)

      - run: bun run lint # includes G1 restricted-imports

      - run: bun run typecheck

      - name: Console build (dummy env) + S1.2/S7.3 guards # task 11
        run: |
          VITE_SUPABASE_URL="https://dummy.invalid" VITE_SUPABASE_ANON_KEY="dummy-not-a-key" \
            bun run --filter console build
          bun run guards

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1 branch tip 2026-07-11
        with:
          version: 2.109.1 # G2: pin the whole toolchain, CLI included

      - name: Start local Supabase stack # real local stack for integration tests
        run: |
          test -f supabase/config.toml || supabase init
          supabase start

      - name: Export local stack env for tests
        run: |
          eval "$(supabase status -o env | grep -E '^(API_URL|ANON_KEY)=')"
          {
            echo "SUPABASE_URL=$API_URL"
            echo "SUPABASE_ANON_KEY=$ANON_KEY"
            echo "DATABASE_URL=postgresql://app_service:app_service_local@127.0.0.1:54322/postgres"
            echo "LOCAL_DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres"
            echo "VAPI_WEBHOOK_SECRET=local-test-secret"
          } >> "$GITHUB_ENV"

      - run: bun test

      - run: bun run rls:check
        env:
          LOCAL_DB_URL: "postgresql://postgres:postgres@127.0.0.1:54322/postgres"

      - name: Build worker image (T14 — build only; deploy stays task 14) # task 11
        run: docker build -f docker/Dockerfile -t revenue-os-worker:ci .
