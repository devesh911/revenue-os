<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>probe</title>
<style>
html,body{margin:0;padding:0;background:#0B1712}
::selection{background:#EDE3CF;color:#0B1712}
.ro-nav-link:hover{color:#EDE3CF;background:rgba(237,227,207,.04)}
.ro-cta-accent:hover{opacity:.88}
.ro-btn-ghost:hover{background:rgba(237,227,207,.07)}
.ro-stage:hover{background:rgba(237,227,207,.03)}
.ro-choose:hover{background:rgba(237,227,207,.06)}
.ro-faq-btn:hover{background:rgba(237,227,207,.03)}
.ro-plan-cta{display:block;width:100%;text-align:left}
.ro-plan[data-selected="true"] .ro-plancard{border-color:#E8C87A}
.ro-plan[data-selected="false"] .ro-plancard{border-color:rgba(237,227,207,.25)}
.ro-plan[data-selected="true"] .ro-radio{background:#E8C87A;border-color:#E8C87A}
.ro-plan[data-selected="false"] .ro-radio{background:transparent;border-color:rgba(237,227,207,.7)}
.ro-plan[data-selected="true"] .ro-cta-choose{display:none}
.ro-plan[data-selected="false"] .ro-cta-subscribe{display:none}
.ro-faq-item[data-open="false"] .ro-faq-a{display:none}
@media (max-width:1100px){
  .ro-grid4{grid-template-columns:repeat(2,1fr)!important}
  .ro-grid4>div:not(:last-child){border-bottom:1px solid rgba(237,227,207,.12)}
}
@media (max-width:980px){
  .ro-nav{display:flex!important;flex-wrap:wrap!important}
  .ro-nav-logo{flex:1 1 100%!important;border-right:none!important;border-bottom:1px solid rgba(237,227,207,.18)!important;padding:20px 24px!important}
  .ro-nav-link{flex:1 1 0!important;justify-content:center!important;padding:16px 6px!important;font-size:11px!important;letter-spacing:.14em!important;white-space:nowrap}
  .ro-nav-cta{flex:1 1 100%!important;border-top:1px solid rgba(237,227,207,.18)!important;padding:14px 24px!important}
  .ro-nav-cta a{display:block;width:100%;text-align:center}
  .ro-grid3{grid-template-columns:1fr!important}
  .ro-grid3>div{border-right:none!important}
  .ro-grid3>div:not(:last-child){border-bottom:1px solid rgba(237,227,207,.12)}
  .ro-pricegrid{grid-template-columns:1fr!important;max-width:560px;margin:0 auto}
  .ro-logos{grid-template-columns:1fr!important}
  .ro-logos-label{max-width:none!important;border-right:none!important;border-bottom:1px solid rgba(237,227,207,.18)!important}
  .ro-faq{grid-template-columns:1fr!important}
  .ro-faq-side{border-right:none!important;border-bottom:1px solid rgba(237,227,207,.18)!important;padding:44px 28px!important}
}
@media (max-width:680px){
  .ro-wrap{padding:12px 12px 0!important}
  .ro-hero{padding:56px 22px 52px!important}
  .ro-hero h1{font-size:38px!important}
  .ro-pad{padding:48px 22px 38px!important}
  .ro-pad2{padding:48px 22px 12px!important}
  .ro-grid4{grid-template-columns:1fr!important}
  .ro-grid4>div{border-right:none!important;padding:30px 24px 34px!important}
  .ro-grid2{grid-template-columns:1fr!important}
  .ro-grid2>div{border-right:none!important;padding:22px 24px!important}
  .ro-grid2>div:first-child{border-bottom:1px solid rgba(237,227,207,.12)}
  .ro-btns{flex-wrap:wrap;justify-content:center}
  .ro-logos-grid{grid-template-columns:repeat(2,1fr)!important}
  .ro-logos-grid>div{border-bottom:1px solid rgba(237,227,207,.09)}
  .ro-pricegrid{padding:28px 16px 32px!important}
  .ro-plancard{min-height:480px!important}
  .ro-faq-btn{padding:20px 22px!important}
  .ro-faq-btn span:first-child{font-size:18px!important}
  .ro-faq-a{padding:0 22px 24px!important}
  .ro-footcta{padding:60px 22px!important}
}
</style>
</head>
<body><p>probe</p></body>
</html>
